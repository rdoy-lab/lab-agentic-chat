<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 18px; font-weight: 600; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 720px; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
    .msg.user, .msg.tool { white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #0f3460; }
    .msg.assistant { align-self: flex-start; background: #16213e; }
    .msg.tool { align-self: flex-start; background: #1a1a2e; border: 1px dashed #0f3460; font-size: 13px; color: #888; }
    .msg .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 4px; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3, .msg.assistant h4 { margin: 12px 0 6px; color: #fff; }
    .msg.assistant h1 { font-size: 1.4em; }
    .msg.assistant h2 { font-size: 1.2em; }
    .msg.assistant h3 { font-size: 1.1em; }
    .msg.assistant p { margin: 6px 0; }
    .msg.assistant ul, .msg.assistant ol { margin: 6px 0; padding-left: 24px; }
    .msg.assistant li { margin: 2px 0; }
    .msg.assistant code { background: #0d1b2a; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: 'SF Mono', 'Fira Code', monospace; }
    .msg.assistant pre { background: #0d1b2a; padding: 12px 16px; border-radius: 8px; margin: 8px 0; overflow-x: auto; }
    .msg.assistant pre code { background: none; padding: 0; font-size: 13px; }
    .msg.assistant blockquote { border-left: 3px solid #e94560; padding-left: 12px; margin: 8px 0; color: #aaa; }
    .msg.assistant a { color: #e94560; }
    .msg.assistant table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .msg.assistant th, .msg.assistant td { border: 1px solid #0f3460; padding: 6px 10px; text-align: left; }
    .msg.assistant th { background: #0d1b2a; font-weight: 600; }
    .msg.assistant hr { border: none; border-top: 1px solid #0f3460; margin: 12px 0; }
    .msg.assistant img { max-width: 100%; border-radius: 8px; }
    #input-area { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; }
    #input-area input { flex: 1; padding: 12px 16px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 15px; outline: none; }
    #input-area input:focus { border-color: #e94560; }
    #input-area button { padding: 12px 24px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing::after { content: "▊"; animation: blink 1s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .thinking { max-width: 720px; padding: 12px 16px; border-radius: 12px; line-height: 1.6; align-self: flex-start; background: #16213e; color: #888; font-style: italic; display: flex; align-items: center; gap: 8px; }
    .thinking .dots span { animation: dot-blink 1.4s infinite both; }
    .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <header>Chat</header>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send">Send</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    marked.setOptions({ breaks: true, gfm: true });

    function appendMsg(role, text, toolName) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const label = role === "tool" ? toolName : role.charAt(0).toUpperCase() + role.slice(1);
      div.innerHTML = `<div class="label">${label}</div>${text}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;
      inputEl.disabled = true;

      appendMsg("user", text);

      const thinkDiv = document.createElement("div");
      thinkDiv.className = "thinking";
      thinkDiv.innerHTML = "Thinking<span class='dots'><span>.</span><span>.</span><span>.</span></span>";
      messagesEl.appendChild(thinkDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      const es = new EventSource(`/chat?message=${encodeURIComponent(text)}`);
      let assistantDiv = null;
      let assistantContent = "";

      es.onmessage = (e) => {
        let raw = e.data;
        if (raw.startsWith("data: ")) raw = raw.slice(6);
        if (!raw.startsWith("{")) return;
        const data = JSON.parse(raw);
        console.log("SSE parsed:", data);
        if (thinkDiv.parentNode) thinkDiv.remove();
        if (data.type === "assistant") {
          const text = typeof data.content === "string" ? data.content : JSON.stringify(data.content);
          if (!assistantDiv) {
            assistantDiv = appendMsg("assistant", "");
            assistantContent = "";
          }
          assistantContent += text;
          assistantDiv.innerHTML = `<div class="label">Assistant</div>${marked.parse(assistantContent)}`;
        } else if (data.type === "tool_call") {
          appendMsg("tool", `Calling ${data.name}(${JSON.stringify(data.args)})…`, data.name);
        } else if (data.type === "tool_result") {
          appendMsg("tool", data.content, data.name);
        } else if (data.type === "error") {
          const div = appendMsg("assistant", "");
          div.innerHTML = `<div class="label">Assistant</div>${marked.parse(`⚠ Error: ${data.content}`)}`;
        } else if (data.type === "done") {
          es.close();
          sendBtn.disabled = false;
          inputEl.disabled = false;
          inputEl.focus();
        }
      };

      es.onerror = () => {
        if (thinkDiv.parentNode) thinkDiv.remove();
        es.close();
        sendBtn.disabled = false;
        inputEl.disabled = false;
      };
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
    inputEl.focus();
  </script>
</body>
</html>
